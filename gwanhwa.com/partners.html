    <script>
        // Logo数据 - 使用logos文件夹中的所有图片
        const logos = [
            'tianjiao.png', 'changan.png', 'baogang.png', 'jianshe.png',
            'jiangbeijichang.png','yuechuanmei.png', 'nanfangdianwang.png', 'yuandong.png',
            'kunlun.png', 'yidong.png',
            'baisai.png', 'jinglong.png'
        ];

        const cardElements = document.querySelectorAll('.logo-card');
        const pagination = document.getElementById('logoPagination');
        const cardsPerPage = 4;
        let currentPage = 0;
        const totalPages = Math.ceil(logos.length / cardsPerPage);

        // 预加载所有Logo图片
        const preloadedImages = {};
        function preloadLogos() {
            logos.forEach(logo => {
                const img = new Image();
                img.src = `images/logos/${logo}`;
                preloadedImages[logo] = img;
            });
        }

        // 双图叠加切换：预加载 + 交叉淡入淡出，彻底无闪烁
        let transitionInProgress = false;

        function updateLogoImages(page) {
            const start = page * cardsPerPage;

            for (let i = 0; i < cardElements.length; i++) {
                const logoIndex = start + i;
                const card = cardElements[i];
                const frontImg = card.querySelector('.logo-img-front');
                const backImg = card.querySelector('.logo-img-back');

                if (logoIndex < logos.length) {
                    // 确保卡片可见
                    card.style.visibility = 'visible';

                    // 第一步：先把新图静默加载到背景层（opacity保持0，不可见）
                    if (backImg.dataset.currentSrc !== logos[logoIndex]) {
                        backImg.src = preloadedImages[logos[logoIndex]].src;
                        backImg.dataset.currentSrc = logos[logoIndex];
                        backImg.style.transition = 'none';
                        backImg.style.opacity = '0';
                    }

                    // 第二步：等一帧确保图片已渲染，再启动交叉淡入淡出
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            // 前景图淡出（从1→0）
                            frontImg.style.transition = 'opacity 0.4s ease';
                            frontImg.style.opacity = '0';

                            // 背景图淡入（从0→1）
                            backImg.style.transition = 'opacity 0.4s ease';
                            backImg.style.opacity = '1';
                        });
                    });

                    // 第三步：交叉淡入淡出完成后，交换前后图层（此时用户看到的图不变）
                    setTimeout(() => {
                        // 把背景图的src同步到前景图
                        frontImg.src = backImg.src;
                        frontImg.dataset.currentSrc = backImg.dataset.currentSrc;
                        
                        // 前景图立即可见（无过渡）
                        frontImg.style.transition = 'none';
                        frontImg.style.opacity = '1';

                        // 背景图归位到隐藏状态（无过渡，为下次切换做准备）
                        backImg.style.transition = 'none';
                        backImg.style.opacity = '0';
                    }, 450);
                } else {
                    // 没有更多logo了，隐藏该卡片
                    card.style.visibility = 'hidden';
                    frontImg.src = '';
                    backImg.src = '';
                    backImg.dataset.currentSrc = '';
                }
            }

            return true;
        }

        // 创建分页点
        function createPagination() {
            pagination.innerHTML = '';
            for (let i = 0; i < totalPages; i++) {
                const dot = document.createElement('div');
                dot.className = 'logo-dot' + (i === 0 ? ' active' : '');
                dot.addEventListener('click', () => goToPage(i));
                pagination.appendChild(dot);
            }
        }

        // 切换页面
        function goToPage(page) {
            if (page < 0 || page >= totalPages) return;
            currentPage = page;

            // 更新分页点
            document.querySelectorAll('.logo-dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === page);
            });

            updateLogoImages(currentPage);
        }

        function nextPage() {
            const next = (currentPage + 1) % totalPages;
            goToPage(next);
        }

        function prevPage() {
            const prev = (currentPage - 1 + totalPages) % totalPages;
            goToPage(prev);
        }

        // 初始化
        preloadLogos();
        createPagination();
        updateLogoImages(0);

        setInterval(nextPage, 5000);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextPage();
            if (e.key === 'ArrowLeft') prevPage();
        });
    </script>
